<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi biblioteca — Conexionar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header>
  <div class="nav container">
    <a href="app.html" class="logo">
      <span style="font-family:'Yeseva One',serif; font-size:20px; color:#fff;">Conexionar</span>
    </a>
    <nav class="nav-links" id="navLinks">
      <a href="app.html">Biblioteca</a>
    </nav>
    <div class="nav-actions">
      <a href="#" id="logoutBtn" class="login">Cerrar sesión</a>
    </div>
  </div>
</header>

<div class="library-header">
  <div class="container">
    <h1 id="saludo">Hola 👋</h1>
    <p id="estadoMembresia"></p>
  </div>
</div>

<div class="container">

  <div id="lockedBanner"></div>

  <div id="pagoMsg"></div>

  <div id="continueSection" style="display:none;">
    <div class="continue-watching">
      <h2 style="font-size:20px; margin-bottom:14px;">Continúa donde quedaste</h2>
      <div id="continueCard"></div>
    </div>
  </div>

  <div class="filters">
    <select id="filtroTipo">
      <option value="">Todos los tipos</option>
      <option value="alineamiento">Alineamiento</option>
      <option value="harmonic">Harmonic</option>
      <option value="meditacion">Meditación</option>
      <option value="pranayama">Pranayama</option>
    </select>
    <select id="filtroNivel">
      <option value="">Todos los niveles</option>
      <option value="principiante">Principiante</option>
      <option value="intermedio">Intermedio</option>
      <option value="avanzado">Avanzado</option>
      <option value="todo_nivel">Todo nivel</option>
    </select>
  </div>

  <div id="classGrid" class="class-grid">
    <p style="grid-column:1/-1; text-align:center; color:var(--texto-secundario); padding:40px 0;">Cargando clases...</p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/config.js"></script>
<script src="assets/supabase-client.js"></script>
<script>
  const TIPO_LABEL = { alineamiento: "Alineamiento", harmonic: "Harmonic", meditacion: "Meditación", pranayama: "Pranayama" };
  const NIVEL_LABEL = { principiante: "Principiante", intermedio: "Intermedio", avanzado: "Avanzado", todo_nivel: "Todo nivel" };
  const NIVEL_PUNTOS = { principiante: 1, intermedio: 2, avanzado: 3, todo_nivel: 0 };
  const INSTRUCTOR_FOTO = {
    "Emma Marín": "assets/emma-marin.jpg",
    "Josefina Fernández": "assets/josefina-fernandez.jpg",
    "Harish Morán": "assets/harish-moran.jpg",
  };

  function renderLevelDots(nivel) {
    const llenos = NIVEL_PUNTOS[nivel] || 0;
    if (nivel === "todo_nivel") return "";
    let html = `<span class="level-dots">`;
    for (let i = 1; i <= 3; i++) {
      html += `<span class="${i <= llenos ? "filled" : ""}"></span>`;
    }
    html += `</span>`;
    return html;
  }

  let todasLasClases = [];
  let perfilActual = null;
  let favoritosIds = new Set();

  function mostrarMensajePago() {
    const params = new URLSearchParams(window.location.search);
    const pago = params.get("pago");
    if (!pago) return;

    const mensajes = {
      exito: "¡Listo! Tu pago se procesó correctamente y tu membresía ya está activa. 🎉",
      rechazado: "Tu pago fue rechazado. Puedes intentarlo de nuevo cuando quieras.",
      error: "Ocurrió un error procesando tu pago. Si el problema persiste, escríbenos.",
      cancelado: "Cancelaste el proceso de pago.",
    };
    const clase = pago === "exito" ? "exito" : "error";
    const texto = mensajes[pago] || null;
    if (!texto) return;

    const div = document.getElementById("pagoMsg");
    div.innerHTML = `<div class="pago-msg ${clase}">${texto}</div>`;

    // Limpiamos el parámetro de la URL para que no se repita al recargar.
    params.delete("pago");
    const nuevaUrl = window.location.pathname + (params.toString() ? "?" + params.toString() : "");
    window.history.replaceState({}, "", nuevaUrl);
  }

  function renderSubscribeBanner() {
    const lockedBanner = document.getElementById("lockedBanner");
    lockedBanner.innerHTML = `
      <div class="subscribe-banner">
        <div class="text">
          <h3>Activa tu membresía</h3>
          <p>Elige un plan para acceder a toda la biblioteca de clases.</p>
        </div>
        <div class="subscribe-actions">
          <button class="btn btn-primary" id="btnMensual">Mensual — $16.990/mes</button>
          <button class="btn btn-tan" id="btnAnual">Anual — $119.880/año</button>
        </div>
      </div>
    `;

    document.getElementById("btnMensual").addEventListener("click", (e) => iniciarPago(e.target, "/api/crear-suscripcion-mensual"));
    document.getElementById("btnAnual").addEventListener("click", (e) => iniciarPago(e.target, "/api/crear-pago-anual"));
  }

  async function iniciarPago(boton, endpoint) {
    boton.disabled = true;
    const textoOriginal = boton.textContent;
    boton.textContent = "Redirigiendo...";

    try {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = "login.html";
        return;
      }

      const res = await fetch(endpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${session.access_token}`,
        },
      });
      const data = await res.json();

      if (!res.ok || !data.url) {
        throw new Error(data.error || "No pudimos iniciar el pago.");
      }

      // Webpay (Transbank) no acepta una simple redirección GET: hay que
      // enviar el token mediante un formulario POST. MercadoPago sí acepta
      // redirección directa a su init_point.
      if (endpoint === "/api/crear-pago-anual" && data.token) {
        const form = document.createElement("form");
        form.method = "POST";
        form.action = data.url;
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = "token_ws";
        input.value = data.token;
        form.appendChild(input);
        document.body.appendChild(form);
        form.submit();
        return;
      }

      window.location.href = data.url;
    } catch (err) {
      console.error(err);
      alert("Ocurrió un problema iniciando el pago. Intenta de nuevo en unos minutos.");
      boton.disabled = false;
      boton.textContent = textoOriginal;
    }
  }

  function renderClassGrid(clases) {
    const grid = document.getElementById("classGrid");
    if (clases.length === 0) {
      grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--texto-secundario); padding:40px 0;">No hay clases que coincidan con estos filtros.</p>`;
      return;
    }
    grid.innerHTML = clases.map((c) => {
      const esFavorita = favoritosIds.has(c.id);
      const foto = INSTRUCTOR_FOTO[c.instructor];
      return `
      <a href="clase.html?id=${c.id}" class="class-tile">
        <div class="thumb">
          ${c.thumbnail_url ? `<img src="${c.thumbnail_url}" alt="${c.title}">` : ""}
          <button class="favorite-btn ${esFavorita ? "is-favorite" : ""}" data-class-id="${c.id}" aria-label="Guardar clase" title="Guardar clase">
            <svg viewBox="0 0 24 24" fill="${esFavorita ? "currentColor" : "none"}" stroke="#fff" stroke-width="2"><path d="M12 21s-7.2-4.6-10-9.3C.3 8.2 2 4.5 5.7 4c2.1-.3 4 .7 6.3 3 2.3-2.3 4.2-3.3 6.3-3 3.7.5 5.4 4.2 3.7 7.7C19.2 16.4 12 21 12 21z"/></svg>
          </button>
          <div class="play-badge">
            <svg viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
          </div>
          ${c.duration_minutes ? `<span class="duration">${c.duration_minutes} min</span>` : ""}
        </div>
        <div class="body">
          <span class="type-tag">${TIPO_LABEL[c.type] || c.type}</span>
          <h3>${c.title}</h3>
          ${c.instructor ? `
          <div class="instructor-row">
            ${foto ? `<img class="instructor-avatar" src="${foto}" alt="${c.instructor}">` : `<span class="instructor-avatar"></span>`}
            <span class="instructor-name">${c.instructor}</span>
          </div>` : ""}
          <div class="meta">
            <span>${NIVEL_LABEL[c.level] || c.level || ""}</span>
            ${renderLevelDots(c.level)}
          </div>
        </div>
      </a>
    `;
    }).join("");
  }

  async function toggleFavorito(claseId, boton) {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return;
    const userId = session.user.id;
    const yaEsFavorita = favoritosIds.has(claseId);

    if (yaEsFavorita) {
      favoritosIds.delete(claseId);
      boton.classList.remove("is-favorite");
      boton.querySelector("svg").setAttribute("fill", "none");
      await supabaseClient.from("favorites").delete().eq("user_id", userId).eq("class_id", claseId);
    } else {
      favoritosIds.add(claseId);
      boton.classList.add("is-favorite");
      boton.querySelector("svg").setAttribute("fill", "currentColor");
      await supabaseClient.from("favorites").insert({ user_id: userId, class_id: claseId });
    }
  }

  document.getElementById("classGrid").addEventListener("click", (e) => {
    const boton = e.target.closest(".favorite-btn");
    if (!boton) return;
    e.preventDefault();
    e.stopPropagation();
    toggleFavorito(boton.dataset.classId, boton);
  });

  function aplicarFiltros() {
    const tipo = document.getElementById("filtroTipo").value;
    const nivel = document.getElementById("filtroNivel").value;
    let filtradas = todasLasClases;
    if (tipo) filtradas = filtradas.filter((c) => c.type === tipo);
    if (nivel) filtradas = filtradas.filter((c) => c.level === nivel);
    renderClassGrid(filtradas);
  }

  document.getElementById("filtroTipo").addEventListener("change", aplicarFiltros);
  document.getElementById("filtroNivel").addEventListener("change", aplicarFiltros);
  document.getElementById("logoutBtn").addEventListener("click", (e) => { e.preventDefault(); signOut(); });

  async function cargarContinuar(userId, acceso) {
    if (!acceso) return;
    const { data, error } = await supabaseClient
      .from("progress")
      .select("*, classes(id, title, thumbnail_url, type)")
      .eq("user_id", userId)
      .eq("completed", false)
      .order("last_watched_at", { ascending: false })
      .limit(1);

    if (error || !data || data.length === 0) return;

    const p = data[0];
    const c = p.classes;
    if (!c) return;

    const pct = p.seconds_watched && p.duration_seconds
      ? Math.min(100, Math.round((p.seconds_watched / p.duration_seconds) * 100))
      : 0;

    document.getElementById("continueSection").style.display = "block";
    document.getElementById("continueCard").innerHTML = `
      <a href="clase.html?id=${c.id}" class="continue-card">
        <div class="thumb">${c.thumbnail_url ? `<img src="${c.thumbnail_url}" alt="">` : ""}</div>
        <div class="info">
          <strong>${c.title}</strong>
          <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%;"></div></div>
        </div>
      </a>
    `;
  }

  async function init() {
    mostrarMensajePago();

    const user = await requireAuth();
    if (!user) return;

    perfilActual = await getProfile(user.id);
    const nombre = (perfilActual && perfilActual.full_name) || user.email;
    document.getElementById("saludo").textContent = `Hola, ${nombre.split(" ")[0]} 👋`;

    const acceso = hasActiveAccess(perfilActual);

    if (perfilActual && perfilActual.membership_status === "trial" && acceso) {
      const dias = trialDaysRemaining(perfilActual);
      document.getElementById("estadoMembresia").textContent = `Te quedan ${dias} día(s) de prueba gratuita.`;
    } else if (acceso) {
      document.getElementById("estadoMembresia").textContent = `Membresía activa — plan ${perfilActual.plan || ""}.`;
    } else {
      document.getElementById("estadoMembresia").textContent = "Tu prueba gratuita terminó.";
    }

    if (!acceso) {
      renderSubscribeBanner();
    }

    await cargarContinuar(user.id, acceso);

    const { data: favs } = await supabaseClient.from("favorites").select("class_id").eq("user_id", user.id);
    if (favs) favoritosIds = new Set(favs.map((f) => f.class_id));

    const { data: clases, error } = await supabaseClient
      .from("classes")
      .select("*")
      .eq("published", true)
      .order("order_index", { ascending: true });

    if (error) {
      console.error(error);
      document.getElementById("classGrid").innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--texto-secundario); padding:40px 0;">No pudimos cargar las clases.</p>`;
      return;
    }

    todasLasClases = clases || [];
    renderClassGrid(todasLasClases);
  }

  init();
</script>
</body>
</html>
