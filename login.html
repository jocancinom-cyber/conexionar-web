<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — Conexionar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header>
  <nav class="nav container">
    <a href="index.html" class="logo">
      <img class="logo-leaves" src="https://conexionar.com/wp-content/uploads/2025/04/Group-4.png" alt="Conexionar">
    </a>
    <div class="nav-actions">
      <a href="registro.html" class="btn btn-primary">Prueba gratis</a>
    </div>
  </nav>
</header>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>Bienvenida de vuelta</h1>
    <p class="subtitle">Inicia sesión para continuar tu práctica.</p>

    <div id="formMsg" class="form-msg"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" required autocomplete="email" placeholder="tucorreo@ejemplo.com">
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="Tu contraseña">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Iniciar sesión</button>
    </form>

    <div class="auth-switch">¿Aún no tienes cuenta? <a href="registro.html">Prueba gratis 7 días</a></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/config.js"></script>
<script src="assets/supabase-client.js"></script>
<script>
  const form = document.getElementById('loginForm');
  const msg = document.getElementById('formMsg');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Ingresando...';
    msg.className = 'form-msg';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
      msg.textContent = 'No pudimos iniciar sesión: ' + (error.message === 'Invalid login credentials' ? 'correo o contraseña incorrectos.' : error.message);
      msg.className = 'form-msg error';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Iniciar sesión';
      return;
    }

    window.location.href = 'app.html';
  });
</script>

</body>
</html>
