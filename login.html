<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — Conexionar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header>
  <div class="nav container">
    <a href="index.html" class="logo">
      <span style="font-family:'Yeseva One',serif; font-size:20px; color:#fff;">Conexionar</span>
    </a>
  </div>
</header>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>Bienvenida de vuelta</h1>
    <p class="subtitle">Inicia sesión para continuar tu práctica.</p>

    <div id="formMsg" class="form-msg"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Iniciar sesión</button>
    </form>

    <p class="auth-switch">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/config.js"></script>
<script src="assets/supabase-client.js"></script>
<script>
  const form = document.getElementById("loginForm");
  const formMsg = document.getElementById("formMsg");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    formMsg.className = "form-msg";
    formMsg.textContent = "";
    submitBtn.disabled = true;
    submitBtn.textContent = "Ingresando...";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
      formMsg.className = "form-msg error";
      formMsg.textContent = "No pudimos iniciar sesión: " + (error.message === "Invalid login credentials" ? "correo o contraseña incorrectos." : error.message);
      submitBtn.disabled = false;
      submitBtn.textContent = "Iniciar sesión";
      return;
    }

    window.location.href = "app.html";
  });

  // Si ya hay sesión activa, saltamos directo a la biblioteca.
  (async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) window.location.href = "app.html";
  })();
</script>
</body>
</html>
