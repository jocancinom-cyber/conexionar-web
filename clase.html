<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clase — Conexionar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header>
  <div class="nav container">
    <a href="app.html" class="logo">
      <span style="font-family:'Yeseva One',serif; font-size:20px; color:#fff;">Conexionar</span>
    </a>
    <nav class="nav-links">
      <a href="app.html">Biblioteca</a>
    </nav>
    <div class="nav-actions">
      <a href="#" id="logoutBtn" class="login">Cerrar sesión</a>
    </div>
  </div>
</header>

<div class="container" style="padding-top:24px;">
  <a href="app.html" class="back-link">← Volver a la biblioteca</a>
</div>

<div id="contenido">
  <div class="loading">Cargando clase...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://player.vimeo.com/api/player.js"></script>
<script src="assets/config.js"></script>
<script src="assets/supabase-client.js"></script>
<script>
  const TIPO_LABEL = { yoga: "Yoga", meditacion: "Meditación", pranayama: "Pranayama" };
  const NIVEL_LABEL = { principiante: "Principiante", intermedio: "Intermedio", avanzado: "Avanzado" };

  document.getElementById("logoutBtn").addEventListener("click", (e) => { e.preventDefault(); signOut(); });

  const params = new URLSearchParams(window.location.search);
  const claseId = params.get("id");

  function renderLocked(clase) {
    document.getElementById("contenido").innerHTML = `
      <div class="container">
        <div class="locked">
          <h2 style="margin-bottom:10px;">${clase.title}</h2>
          <p>Esta clase es solo para usuarias con membresía activa.</p>
          <a href="app.html" class="btn btn-primary">Ver planes disponibles</a>
        </div>
      </div>
    `;
  }

  function renderNoEncontrada() {
    document.getElementById("contenido").innerHTML = `
      <div class="container">
        <div class="locked">
          <h2>Clase no encontrada</h2>
          <a href="app.html" class="btn btn-primary">Volver a la biblioteca</a>
        </div>
      </div>
    `;
  }

  let progresoGuardadoSeg = 0;
  let duracionTotalSeg = 0;
  let userIdActual = null;
  let claseIdActual = null;
  let ultimoGuardado = 0;

  async function saveProgress(segundos, completado) {
    if (!userIdActual || !claseIdActual) return;
    await supabaseClient.from("progress").upsert({
      user_id: userIdActual,
      class_id: claseIdActual,
      progress_seconds: Math.round(segundos),
      duration_seconds: Math.round(duracionTotalSeg) || null,
      completed: !!completado,
      updated_at: new Date().toISOString(),
    }, { onConflict: "user_id,class_id" });
  }

  function renderPlayer(clase, video) {
    document.getElementById("contenido").innerHTML = `
      <div class="player-wrap">
        <div class="player-frame">
          <iframe id="vimeoFrame"
            src="https://player.vimeo.com/video/${video.vimeo_id}${video.vimeo_hash ? "?h=" + video.vimeo_hash : ""}"
            allow="autoplay; fullscreen; picture-in-picture" allowfullscreen>
          </iframe>
        </div>
      </div>
      <div class="container player-info">
        <span class="type-tag">${TIPO_LABEL[clase.class_type] || clase.class_type}</span>
        <h1>${clase.title}</h1>
        <div class="player-meta">
          ${clase.level ? `<span>${NIVEL_LABEL[clase.level] || clase.level}</span>` : ""}
          ${clase.duration_minutes ? `<span>· ${clase.duration_minutes} min</span>` : ""}
        </div>
        <p>${clase.description || ""}</p>
      </div>
    `;

    const iframe = document.getElementById("vimeoFrame");
    const player = new Vimeo.Player(iframe);

    player.getDuration().then((d) => { duracionTotalSeg = d; });

    player.on("timeupdate", (data) => {
      const ahora = Date.now();
      if (ahora - ultimoGuardado > 10000) {
        ultimoGuardado = ahora;
        saveProgress(data.seconds, false);
      }
    });

    player.on("ended", () => {
      saveProgress(duracionTotalSeg, true);
    });
  }

  async function init() {
    const user = await requireAuth();
    if (!user) return;
    userIdActual = user.id;
    claseIdActual = claseId;

    if (!claseId) { renderNoEncontrada(); return; }

    const { data: clase, error: errClase } = await supabaseClient
      .from("classes")
      .select("*")
      .eq("id", claseId)
      .single();

    if (errClase || !clase) { renderNoEncontrada(); return; }

    const { data: video } = await supabaseClient
      .from("class_videos")
      .select("*")
      .eq("class_id", claseId)
      .maybeSingle();

    if (!video) {
      renderLocked(clase);
      return;
    }

    renderPlayer(clase, video);
  }

  init();
</script>
</body>
</html>
