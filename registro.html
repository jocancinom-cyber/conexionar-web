<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta — Conexionar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header>
  <nav class="nav container">
    <a href="index.html" class="logo">
      <img class="logo-leaves" src="https://conexionar.com/wp-content/uploads/2025/04/Group-4.png" alt="Conexionar">
    </a>
    <div class="nav-actions">
      <a href="login.html" class="login">Ya tengo cuenta</a>
    </div>
  </nav>
</header>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>Crea tu cuenta</h1>
    <p class="subtitle">7 días de prueba gratis. Sin compromiso, cancela cuando quieras.</p>

    <div id="formMsg" class="form-msg"></div>

    <form id="registroForm">
      <div class="field">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" required autocomplete="name" placeholder="Tu nombre">
      </div>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" required autocomplete="email" placeholder="tucorreo@ejemplo.com">
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required minlength="6" autocomplete="new-password" placeholder="Mínimo 6 caracteres">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Empieza tu prueba gratis</button>
    </form>

    <div class="auth-switch">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/config.js"></script>
<script src="assets/supabase-client.js"></script>
<script>
  const form = document.getElementById('registroForm');
  const msg = document.getElementById('formMsg');
  const submitBtn = document.getElementById('submitBtn');

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = 'form-msg ' + type;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creando tu cuenta...';
    msg.className = 'form-msg';

    const nombre = document.getElementById('nombre').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password,
      options: { data: { full_name: nombre } }
    });

    if (error) {
      showMsg('No pudimos crear tu cuenta: ' + error.message, 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Empieza tu prueba gratis';
      return;
    }

    // Si Supabase tiene "Confirm email" activado, no hay sesión todavía.
    if (!data.session) {
      showMsg('¡Listo! Te enviamos un correo para confirmar tu cuenta. Revisa tu bandeja de entrada (y spam).', 'success');
      submitBtn.textContent = 'Revisa tu correo';
      return;
    }

    // Si no requiere confirmación, entra directo a la biblioteca.
    window.location.href = 'app.html';
  });
</script>

</body>
</html>
