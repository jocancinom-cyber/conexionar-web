<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta — Conexionar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header>
  <div class="nav container">
    <a href="index.html" class="logo">
      <span style="font-family:'Yeseva One',serif; font-size:20px; color:#fff;">Conexionar</span>
    </a>
  </div>
</header>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>Crea tu cuenta</h1>
    <p class="subtitle">Empieza tu práctica hoy mismo.</p>

    <div id="formMsg" class="form-msg"></div>

    <form id="registroForm">
      <div class="field">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" required autocomplete="name">
      </div>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Crear cuenta</button>
    </form>

    <p class="auth-switch">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/config.js"></script>
<script src="assets/supabase-client.js"></script>
<script>
  const form = document.getElementById("registroForm");
  const formMsg = document.getElementById("formMsg");
  const submitBtn = document.getElementById("submitBtn");

  // Preservamos el plan elegido en la landing (?plan=mensual / ?plan=anual)
  // para poder usarlo más adelante si hace falta.
  const params = new URLSearchParams(window.location.search);
  const planElegido = params.get("plan");
  if (planElegido) sessionStorage.setItem("plan_elegido", planElegido);

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    formMsg.className = "form-msg";
    formMsg.textContent = "";
    submitBtn.disabled = true;
    submitBtn.textContent = "Creando cuenta...";

    const nombre = document.getElementById("nombre").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password,
      options: { data: { full_name: nombre } },
    });

    if (error) {
      formMsg.className = "form-msg error";
      formMsg.textContent = "No pudimos crear tu cuenta: " + error.message;
      submitBtn.disabled = false;
      submitBtn.textContent = "Crear cuenta";
      return;
    }

    if (!data.session) {
      formMsg.className = "form-msg success";
      formMsg.textContent = "¡Listo! Te enviamos un correo de confirmación. Revisa tu bandeja de entrada para activar tu cuenta.";
      form.reset();
      submitBtn.disabled = false;
      submitBtn.textContent = "Crear cuenta";
      return;
    }

    window.location.href = "app.html";
  });
</script>
</body>
</html>
